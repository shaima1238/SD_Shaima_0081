<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <h3 class="text-white">Employee Payroll System</h3>

        <div>
            <a href="/dashboard" class="btn btn-light">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>

    </div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg">

<div class="card-header bg-success text-white text-center">

<h3>Add Employee</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Employee Name</label>
<input type="text" class="form-control" name="name" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" name="email" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="text" class="form-control" name="phone" maxlength="10" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Department</label>

<select class="form-select" name="department" required>

<option value="">Select Department</option>
<option>HR</option>
<option>IT</option>
<option>Finance</option>
<option>Sales</option>
<option>Marketing</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label class="form-label">Joining Date</label>
<input type="date" class="form-control" name="joining" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Basic Salary (₹)</label>
<input type="number" class="form-control" name="basic" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Absent Days</label>
<input
type="number"
class="form-control"
name="absent_days"
min="0"
max="30"
value="0"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Working Days</label>
<input
type="number"
class="form-control"
value="30"
readonly>
</div>

</div>

<div class="d-grid mt-3">

<button class="btn btn-success btn-lg">

Save Employee

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
